<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="30">
    <title>::Monitoração Mediação::</title>
    <style>
        /* Reseta e Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a; /* Azul marinho profundo */
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        /* Estilização dos Títulos */
        h1 {
            font-size: 2.5rem;
            letter-spacing: -1px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        h2 {
            font-size: 1.2rem;
            color: #94a3b8;
            font-weight: 400;
            margin-bottom: 40px;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 10px;
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        /* Grid de Cards */
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            width: 100%;
            max-width: 1200px;
        }

        /* Cards Estilizados */
        .card {
            padding: 20px 15px;
            border-radius: 12px;
            width: 120px;
            text-align: center;
        }

        /* Cores do Semáforo */
        .ok {
            background-color: #059669; /* Verde esmeralda mais sóbrio */
            border: 1px solid #10b981;
        }

        .nok {
            background-color: #b91c1c; /* Vermelho mais forte */
            border: 1px solid #ef4444;
            animation: pulse 2s infinite; /* Alerta visual para erro */
        }

        .info {
            font-size: 0.7rem;
            margin-top: 12px;
            color: rgba(255, 255, 255, 0.8);
            font-family: monospace;
        }

        /* Animação suave para erros */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>

<body>
    <h1>Monitoração Mediação</h1>
    <h2>Coleta</h2>

    <div class="container">
        {{range .}}
        <div class="card {{if eq .Status "ok"}}ok{{else}}nok{{end}}">
            <h3>{{.Nome}}</h3>
            <div class="info">{{.UltimaAtualizacao}}</div>
        </div>
        {{end}}
    </div>
</body>

</html>

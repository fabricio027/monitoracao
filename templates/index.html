<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="30">
    <title>Monitoração</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body {
            font-family: sans-serif;
            background: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #333;
        }
                
        .container { 
            display: flex; 
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px; 
            margin-top: 20px; 
        }
                
        .card { 
            padding: 20px; 
            border-radius: 8px; 
            width: 90px; 
            text-align: center; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
                
        .ok { 
            background-color: #2ecc71; 
            color: white; 
        }
                
        .nok { 
            background-color: #e74c3c; 
            color: white; 
        }
                
        .info { 
            font-size: 0.8em; 
            margin-top: 10px; 
            color: #eee; 
        }
    </style>
</head>
<body>
    <h1>Monitoração</h1>
    <h2>Coleta</h2>
    <div class="container">
        {{range .}}
        <div class="card {{if eq .Status "ok"}}ok{{else}}nok{{end}}">
            <h3>{{.Nome}}</h3>
            <div class="info">Último arquivo: {{.UltimaAtualizacao}}</div>
        </div>
        {{end}}
    </div>
</body>
</html>
